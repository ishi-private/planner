<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --surface3: #2d333b;
      --border: #30363d; --text: #e6edf3; --muted: #8b949e;
      --accent: #58a6ff; --accent-dim: rgba(88,166,255,0.12);
      --green: #3fb950; --green-dim: rgba(63,185,80,0.12);
      --yellow: #d29922; --yellow-dim: rgba(210,153,34,0.12);
      --red: #f85149; --red-dim: rgba(248,81,73,0.12);
      --purple: #bc8cff; --purple-dim: rgba(188,140,255,0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px;
    }

    #header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 16px; display: flex; align-items: center; justify-content: space-between;
      height: 52px; position: sticky; top: 0; z-index: 100;
    }
    #header h1 { font-size: 16px; font-weight: 600; }
    #updated { font-size: 11px; color: var(--muted); }

    #tab-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; padding: 0 16px; position: sticky; top: 52px; z-index: 99;
      overflow-x: auto;
    }
    .tab-btn {
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--muted); cursor: pointer; font-size: 13px; padding: 10px 14px;
      white-space: nowrap;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    #main { padding: 16px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    h2 { font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .stats-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; }
    .stat-label { font-size: 11px; color: var(--muted); }
    .stat-value { font-size: 18px; font-weight: 700; }
    .stat-value.green  { color: var(--green); }
    .stat-value.yellow { color: var(--yellow); }
    .stat-value.red    { color: var(--red); }
    .stat-value.accent { color: var(--accent); }

    /* Tasks */
    .task-group { margin-bottom: 20px; }
    .task-group-label {
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
    }
    .task-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px; margin-bottom: 8px;
    }
    .task-card.done { opacity: 0.45; }
    .task-card.done .task-title { text-decoration: line-through; }
    .task-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    .task-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

    .badge {
      display: inline-flex; align-items: center; border-radius: 4px;
      font-size: 11px; font-weight: 600; padding: 2px 6px;
    }
    .badge.priority-high   { background: var(--red-dim);    color: var(--red); }
    .badge.priority-medium { background: var(--yellow-dim); color: var(--yellow); }
    .badge.priority-low    { background: var(--green-dim);  color: var(--green); }
    .task-due { font-size: 11px; color: var(--muted); }
    .task-due.overdue { color: var(--red); }

    /* Considerations */
    .consider-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px; margin-bottom: 10px;
    }
    .consider-title { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .consider-desc { font-size: 13px; color: var(--muted); line-height: 1.6; white-space: pre-wrap; word-break: break-word; margin-bottom: 8px; }
    .consider-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .tag { background: var(--purple-dim); color: var(--purple); border-radius: 4px; font-size: 11px; padding: 2px 6px; }
    .consider-date { font-size: 11px; color: var(--muted); }

    /* Notes */
    .notes-body {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 16px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; word-break: break-word;
      min-height: 100px; color: var(--muted);
    }
    .notes-body.has-content { color: var(--text); }

    .empty { text-align: center; color: var(--muted); padding: 40px 16px; font-size: 13px; }
    .empty-icon { font-size: 28px; margin-bottom: 8px; }

    .readonly-badge {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
      font-size: 11px; color: var(--muted); padding: 2px 8px;
    }

    /* Knowledge */
    .knowledge-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px; margin-bottom: 10px;
    }
    .knowledge-cat {
      display: inline-block; background: var(--accent-dim); color: var(--accent);
      border-radius: 4px; font-size: 11px; font-weight: 600; padding: 2px 6px; margin-bottom: 6px;
    }
    .knowledge-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .knowledge-section { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 2px; }
    .knowledge-text { font-size: 13px; color: var(--text); line-height: 1.6; white-space: pre-wrap; word-break: break-word; margin-bottom: 8px; }
    .knowledge-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
    .knowledge-date { font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>

<div id="header">
  <h1>Planner</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="readonly-badge">閲覧専用</span>
    <span id="updated"></span>
  </div>
</div>

<div id="tab-bar">
  <button class="tab-btn active" data-tab="tasks">短期タスク</button>
  <button class="tab-btn" data-tab="considerations">長期検討事項</button>
  <button class="tab-btn" data-tab="notes">メモ</button>
  <button class="tab-btn" data-tab="knowledge">知見</button>
</div>

<div id="main">
  <div id="tab-tasks" class="tab-panel active">
    <div id="task-stats" class="stats-bar"></div>
    <div id="task-list"></div>
  </div>
  <div id="tab-considerations" class="tab-panel">
    <div id="consideration-list"></div>
  </div>
  <div id="tab-notes" class="tab-panel">
    <div id="notes-body" class="notes-body"></div>
  </div>
  <div id="tab-knowledge" class="tab-panel">
    <div id="knowledge-list"></div>
  </div>
</div>

確認する。APIが存在すればPlaywright等のブラウザ自動化は不要。","tags":["調査","スクレイピング","API"],"createdAt":"2026-03-01"},{"id":"kn-002","title":"Windowsコンソール出力の文字化け対策","category":"Windows環境","project":"Phase 1","symptom":"print()でUTF-8の日本語が文字化けする","cause":"WindowsのコンソールはCP932（Shift-JIS）のため、UTF-8の日本語が化ける","remedy":"print()ではなくファイルに書き出して確認する（ensure_ascii=False + UTF-8で保存）","tags":["Windows","Python","文字コード"],"createdAt":"2026-03-01"},{"id":"kn-003","title":"Windowsでのプロセス操作はPowerShellを使う","category":"Windows環境","project":"Phase 1","symptom":"bashからtaskkillを直接実行すると構文エラーになる","cause":"taskkillはWindowsネイティブコマンドでbashから直接呼べない","remedy":"PowerShellを使う（Stop-Process -Id {PID} -Force）","tags":["Windows","bash","PowerShell","プロセス"],"createdAt":"2026-03-01"},{"id":"kn-004","title":"Claude Codeのバックグラウンドタスクには実行時間制限がある","category":"Windows環境","project":"Phase 1","symptom":"バックグラウンドで起動したローカルサーバーが途中で停止する","cause":"Claude Codeのバックグラウンドタスクには実行時間の制限がある","remedy":"ローカルサーバーの起動はユーザーに別ターミナルでの実行を依頼する","tags":["Claude Code","バックグラウンド","サーバー"],"createdAt":"2026-03-01"},{"id":"kn-005","title":"ファイル移動時はスクリプト内のパス参照も同時に修正する","category":"ファイル管理","project":"Phase 1","symptom":"フォルダ整理後、スクリプト内の相対パスが壊れて4ファイルを別途修正する手戻りが発生","cause":"scripts/ explore/ へのフォルダ整理後、パス参照の更新を忘れた","remedy":"ファイルを移動するときは同時にスクリプト内のパス参照を確認・修正する。パスはos.path.abspath(__file__)を基準にした絶対パスで記述する。","tags":["ファイル管理","Python","パス"],"createdAt":"2026-03-01"},{"id":"kn-006","title":"ルール・意思決定はその場で記録する","category":"作業プロセス","project":"Phase 1","symptom":"調査ルールや作業ルールが後追いで作成され、抜け漏れが生じた","cause":"ルールや意思決定の記録タイミングが後回しになった","remedy":"ルールや意思決定が確定したらその場で記録する。後追いで作ると抜け漏れが生じる。","tags":["作業プロセス","ドキュメント"],"createdAt":"2026-03-01"},{"id":"kn-007","title":"PowerShellの$PROFILEパスはOneDriveリダイレクトに注意","category":"Windows環境","project":"環境構築","symptom":"C:\\Users\\ishi3\\Documents\\WindowsPowerShell\\ にプロファイルを作成したが読み込まれなかった","cause":"ドキュメントフォルダがOneDriveにリダイレクトされており、$PROFILEの実際のパスはC:\\Users\\ishi3\\OneDrive\\ドキュメント\\WindowsPowerShell\\ になる","remedy":"プロファイルを作成する前に $PROFILE の値を確認する。このPCでの正しいパス: C:\\Users\\ishi3\\OneDrive\\ドキュメント\\WindowsPowerShell\\Microsoft.PowerShell_profile.ps1","tags":["Windows","PowerShell","OneDrive","プロファイル"],"createdAt":"2026-03-21"},{"id":"kn-008","title":"ユーザーが明示したパスと異なる場所を検索してしまう（文脈の引きずり）","category":"作業プロセス","project":"planner","symptom":"ユーザーが「F:\\docs\\plannerにあります」と教えた直後、shadowverse-wb/planner.html を検索して「存在しない」と誤報告した","cause":"直前の話題（shadowverse-wb）の文脈を引きずり、ユーザーが明示したパスを正確に使わなかった","remedy":"ユーザーが明示したパスは必ずそのまま使う。話題が切り替わったら前の文脈の前提をリセットする。","tags":["作業プロセス","検索","パス","Claude Code"],"createdAt":"2026-03-28"}]},"learning":{"version":1,"entries":[{"id":"ln-001","title":"Claude Code ツール群のアーキテクチャ（preview_start / Chrome ツール / MCP）","category":"Claude Code","summary":"preview_start はローカルプロセスを直接 spawn して管理する。Chrome ツールは拡張機能経由のブラウザ操作のみ。MCP はこれらを Claude に繋ぐ標準規格。","detail":"【preview_start】\n.claude/launch.json を読んで python 等のプロセスを子プロセスとして起動・監視する。stdout/stderr は preview_logs で取得可能。Claude Code が動くPC上で直接実行される。\n\n【mcp__Claude_in_Chrome__*】\nChrome 拡張機能 → WebSocket → Chrome DevTools Protocol (CDP) でブラウザを操作する。すでに開いているブラウザの操作のみが可能で、OSレベルのプロセス起動はできない（拡張機能のサンドボックス制約）。\n\n【なぜ Chrome ツールからサーバー起動できないか】\nChrome 拡張機能はサンドボックス内で動くため OS レベルでプロセスを起動する権限がない。\n\n【MCP 全体】\nModel Context Protocol = Claude にツールを追加するための標準規格。mcp__XXX__* の XXX 部分が各 MCP サーバー名。Claude 本体はクラウド上にあり、ローカルで動く MCP サーバーが橋渡しする。","source":"会話 2026-03-28","tags":["Claude Code","MCP","preview_start","Chrome","アーキテクチャ"],"createdAt":"2026-03-28"},{"id":"ln-002","title":"UserPromptSubmit フックの正しい実装パターン","category":"Claude Code","summary":"UserPromptSubmit フックは exit 0 + stdout でコンテキスト注入。exit 2 はブロック扱い。日本語出力には OutputEncoding 設定が必要。settings.json は即時反映。","detail":"【exit code の挙動】\n- exit 0: メッセージを通過させる。stdout があれば Claude のコンテキストに注入される。\n- exit 1: ブロック。ユーザーにエラー表示。\n- exit 2: ブロック扱い（UserPromptSubmit では「コンテキスト注入」にならない）。\n※ PreToolUse と異なり UserPromptSubmit では exit 2 = ブロック。\n\n【日本語文字化け対策】\n-NoProfile フラグを使うと PowerShell プロファイルの UTF-8 設定が無効になる。\nスクリプト冒頭に以下を追加して解決：\n[Console]::OutputEncoding = [System.Text.Encoding]::UTF8\n\n【settings.json の反映タイミング】\n変更は即時反映される。セッション再起動は不要。\n\n【フックスクリプトに日本語を含む場合】\nsettings.json の command に日本語をインラインで書かない。\n外部 .ps1 ファイルを Python (utf-8-sig) で作成し -File で参照する。\n\n【stdin の形式】\nユーザーメッセージは JSON 形式で stdin に渡される：\n{\"prompt\": \"ユーザーのメッセージ\", ...}\ntry { $msg = ($rawIn | ConvertFrom-Json).prompt } catch { $msg = $rawIn }\nのように JSON パースしてから使う。\n\n【安全策】\nスクリプト冒頭に trap { exit 0 } を入れておくと、\n予期しない例外発生時もブロックにならずパススルーされる。","source":"会話 2026-03-28","tags":["Claude Code","hooks","UserPromptSubmit","PowerShell","エンコード"],"createdAt":"2026-03-28"}]}};

const PRIORITY_LABEL = { high: '高', medium: '中', low: '低' };
const STATUS_GROUP   = { todo: '未着手', inprogress: '進行中', done: '完了' };
const STATUS_ORDER   = ['inprogress', 'todo', 'done'];

function today() { return new Date().toISOString().slice(0, 10); }
function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T00:00:00').toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });
}
function isOverdue(d) { return d ? d < today() : false; }
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

function render(data) {
  const tasks          = data.tasks || [];
  const considerations = data.considerations || [];
  const notes          = data.notes || '';
  const knowledge      = (data.knowledge && data.knowledge.entries) ? data.knowledge.entries : [];

  // Stats
  const c = { todo: 0, inprogress: 0, done: 0, overdue: 0 };
  tasks.forEach(t => {
    c[t.status]++;
    if (t.status !== 'done' && isOverdue(t.dueDate)) c.overdue++;
  });
  document.getElementById('task-stats').innerHTML = `
    <div class="stat"><div class="stat-label">未着手</div><div class="stat-value accent">${c.todo}</div></div>
    <div class="stat"><div class="stat-label">進行中</div><div class="stat-value yellow">${c.inprogress}</div></div>
    <div class="stat"><div class="stat-label">完了</div><div class="stat-value green">${c.done}</div></div>
    ${c.overdue > 0 ? `<div class="stat"><div class="stat-label">期限超過</div><div class="stat-value red">${c.overdue}</div></div>` : ''}`;

  // Tasks grouped by status
  const list = document.getElementById('task-list');
  if (tasks.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">✓</div>タスクはありません</div>';
  } else {
    list.innerHTML = STATUS_ORDER.map(status => {
      const group = tasks.filter(t => t.status === status);
      if (!group.length) return '';
      return `<div class="task-group">
        <div class="task-group-label">${STATUS_GROUP[status]} (${group.length})</div>
        ${group.map(t => {
          const overdue = status !== 'done' && isOverdue(t.dueDate);
          return `<div class="task-card ${status === 'done' ? 'done' : ''}">
            <div class="task-title">${escHtml(t.title)}</div>
            <div class="task-meta">
              <span class="badge priority-${t.priority}">${PRIORITY_LABEL[t.priority]}</span>
              ${t.dueDate ? `<span class="task-due ${overdue ? 'overdue' : ''}">${overdue ? '⚠ ' : ''}${fmtDate(t.dueDate)}</span>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }).join('');
  }

  // Considerations
  const cList = document.getElementById('consideration-list');
  if (considerations.length === 0) {
    cList.innerHTML = '<div class="empty"><div class="empty-icon">💡</div>検討事項はありません</div>';
  } else {
    cList.innerHTML = considerations.map(c => `
      <div class="consider-card">
        <div class="consider-title">${escHtml(c.title)}</div>
        ${c.description ? `<div class="consider-desc">${escHtml(c.description)}</div>` : ''}
        ${c.tags && c.tags.length ? `<div class="consider-tags">${c.tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}</div>` : ''}
        <div class="consider-date">追加: ${fmtDate(c.createdAt)}</div>
      </div>`).join('');
  }

  // Notes
  const nb = document.getElementById('notes-body');
  if (notes.trim()) { nb.textContent = notes; nb.classList.add('has-content'); }
  else { nb.textContent = '（メモなし）'; }

  // Knowledge
  const kList = document.getElementById('knowledge-list');
  if (knowledge.length === 0) {
    kList.innerHTML = '<div class="empty"><div class="empty-icon">📚</div>知見はありません</div>';
  } else {
    kList.innerHTML = knowledge.map(e => `
      <div class="knowledge-card">
        <div><span class="knowledge-cat">${escHtml(e.category||'')}</span>${e.project ? `<span style="font-size:11px;color:var(--muted);margin-left:6px">${escHtml(e.project)}</span>` : ''}</div>
        <div class="knowledge-title">${escHtml(e.title)}</div>
        ${e.symptom ? `<div class="knowledge-section">症状</div><div class="knowledge-text">${escHtml(e.symptom)}</div>` : ''}
        ${e.cause   ? `<div class="knowledge-section">原因</div><div class="knowledge-text">${escHtml(e.cause)}</div>` : ''}
        ${e.remedy  ? `<div class="knowledge-section">対策</div><div class="knowledge-text">${escHtml(e.remedy)}</div>` : ''}
        ${e.tags && e.tags.length ? `<div class="knowledge-tags">${e.tags.map(t => `<span class="tag">${escHtml(t)}</span>`).join('')}</div>` : ''}
        <div class="knowledge-date">登録: ${fmtDate(e.createdAt)}</div>
      </div>`).join('');
  }
}

// Load embedded data
if (typeof EMBEDDED_DATA !== 'undefined') {
  render(EMBEDDED_DATA);
  if (EMBEDDED_DATA._updatedAt) {
    document.getElementById('updated').textContent = EMBEDDED_DATA._updatedAt;
  }
} else {
  document.getElementById('task-list').innerHTML =
    '<div class="empty"><div class="empty-icon">⚠</div>データが見つかりません</div>';
}
</script>
</body>
</html>
